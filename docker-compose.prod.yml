services:
  bpv-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bpv-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    ports:
      - "3006:3001"
    networks:
      - bpv-net
      - shared-db        # network เดียวกับ postgres ที่มีอยู่แล้ว

networks:
  bpv-net:
    driver: bridge
  shared-db:
    external: true       # ใช้ network ของ postgres ที่มีอยู่
